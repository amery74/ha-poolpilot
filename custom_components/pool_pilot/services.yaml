add_product:
  name: Ajouter un produit au Pool House
  description: Ajoute ou met à jour un produit chimique avec sa règle de dosage et son stock.
  fields:
    id:
      name: Identifiant
      description: Identifiant stable optionnel. Laisser vide pour créer automatiquement.
      selector:
        text:
    name:
      name: Nom
      required: true
      selector:
        text:
    category:
      name: Catégorie
      required: true
      selector:
        select:
          options:
            - label: pH moins
              value: ph_minus
            - label: pH plus
              value: ph_plus
            - label: Chlore / désinfectant
              value: chlorine
            - label: Brome
              value: bromine
            - label: Alcalinité
              value: alkalinity
            - label: Stabilisant
              value: stabilizer
            - label: Anti-algues
              value: algaecide
            - label: Sel
              value: salt
            - label: Autre
              value: other
    dosage_quantity:
      name: Quantité de dosage
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    dosage_unit:
      name: Unité de dosage
      required: true
      selector:
        select:
          options:
            - g
            - kg
            - ml
            - L
            - pastille
            - galet
            - dose
    volume_basis_m3:
      name: Volume de référence
      default: 10
      selector:
        number:
          min: 1
          max: 200
          step: 0.5
          unit_of_measurement: m³
          mode: box
    effect_delta:
      name: Effet de correction
      description: Pour pH, valeur corrigée par dose (ex. 0.1). Pour chlore, ppm ajoutés par dose. Laisser vide pour un dosage d'entretien.
      selector:
        number:
          min: 0
          max: 20
          step: 0.01
          mode: box
    stock_quantity:
      name: Quantité en stock
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    stock_unit:
      name: Unité du stock
      selector:
        select:
          options:
            - g
            - kg
            - ml
            - L
            - pastille
            - galet
            - dose
    notes:
      name: Notes
      selector:
        text:

set_product_stock:
  name: Mettre à jour le stock d’un produit
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:
    stock_quantity:
      name: Quantité restante
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    stock_unit:
      name: Unité
      selector:
        select:
          options: [g, kg, ml, L, pastille, galet, dose]

confirm_product_added:
  name: Confirmer l’ajout d’un produit
  description: Enregistre l’ajout et décrémente le stock si les unités correspondent.
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:
    quantity:
      name: Quantité ajoutée
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box

remove_product:
  name: Supprimer un produit
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:
