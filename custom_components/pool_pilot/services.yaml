add_product:
  name: Ajouter un produit au Pool House
  description: Ajoute ou met à jour un produit chimique avec sa règle de dosage et son stock.
  fields:
    id:
      name: Identifiant
      description: Identifiant stable optionnel. Laisser vide pour créer automatiquement.
      selector:
        text:
    name:
      name: Nom
      required: true
      selector:
        text:
    category:
      name: Catégorie
      required: false
      selector:
        select:
          options:
            - label: pH moins
              value: ph_minus
            - label: pH plus
              value: ph_plus
            - label: Chlore / désinfectant
              value: chlorine
            - label: Brome
              value: bromine
            - label: Alcalinité
              value: alkalinity
            - label: Stabilisant
              value: stabilizer
            - label: Anti-algues
              value: algaecide
            - label: Hivernage
              value: wintering
            - label: Sel
              value: salt
            - label: Autre
              value: other
    dosage_quantity:
      name: Quantité de dosage
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    dosage_unit:
      name: Unité de dosage
      required: true
      selector:
        select:
          options:
            - g
            - kg
            - ml
            - L
            - pastille
            - galet
            - dose
    volume_basis_m3:
      name: Volume de référence
      default: 10
      selector:
        number:
          min: 1
          max: 200
          step: 0.5
          unit_of_measurement: m³
          mode: box
    effect_delta:
      name: Effet de correction
      description: Pour pH, valeur corrigée par dose (ex. 0.1). Pour chlore, ppm ajoutés par dose. Laisser vide pour un dosage d'entretien.
      selector:
        number:
          min: 0
          max: 20
          step: 0.01
          mode: box
    stock_quantity:
      name: Quantité en stock
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    stock_unit:
      name: Unité du stock
      selector:
        select:
          options:
            - g
            - kg
            - ml
            - L
            - pastille
            - galet
            - dose
    brand:
      name: Marque
      selector:
        text:
    form:
      name: Forme du produit
      selector:
        text:
    notes:
      name: Notes
      selector:
        text:

update_product:
  name: Modifier un produit du Pool House
  description: Modifie un produit chimique existant. Si l’identifiant n’existe pas encore, le produit est créé.
  fields:
    id:
      name: Identifiant produit
      required: true
      selector:
        text:
    name:
      name: Nom
      required: true
      selector:
        text:
    category:
      name: Catégorie
      selector:
        select:
          options:
            - label: pH moins
              value: ph_minus
            - label: pH plus
              value: ph_plus
            - label: Chlore / désinfectant
              value: chlorine
            - label: Brome
              value: bromine
            - label: Anti-algues
              value: algaecide
            - label: Autre
              value: other
    dosage_quantity:
      name: Quantité de dosage
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    dosage_unit:
      name: Unité de dosage
      required: true
      selector:
        select:
          options: [g, kg, ml, L, pastille, galet, dose]
    volume_basis_m3:
      name: Volume de référence
      selector:
        number:
          min: 1
          max: 200
          step: 0.5
          unit_of_measurement: m³
          mode: box
    effect_delta:
      name: Effet de correction
      selector:
        number:
          min: 0
          max: 20
          step: 0.01
          mode: box
    stock_quantity:
      name: Quantité en stock
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    stock_unit:
      name: Unité du stock
      selector:
        select:
          options: [g, kg, ml, L, pastille, galet, dose]
    notes:
      name: Notes
      selector:
        text:

set_product_stock:
  name: Mettre à jour le stock d’un produit
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:
    stock_quantity:
      name: Quantité restante
      required: true
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    stock_unit:
      name: Unité
      selector:
        select:
          options: [g, kg, ml, L, pastille, galet, dose]

confirm_product_added:
  name: Confirmer l’ajout d’un produit
  description: Enregistre l’ajout et décrémente le stock si les unités correspondent.
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:
    quantity:
      name: Quantité ajoutée
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box

remove_product:
  name: Supprimer un produit
  fields:
    product_id:
      name: Identifiant produit
      required: true
      selector:
        text:

start_auto_filtration:
  name: Démarrer la filtration automatique
  description: Démarre la pompe pour la durée recommandée par Pool Pilot, puis l’arrête automatiquement.
  fields:
    duration_hours:
      name: Durée forcée
      description: Optionnel. Si vide, Pool Pilot utilise la durée de filtration recommandée.
      selector:
        number:
          min: 0.1
          max: 24
          step: 0.1
          unit_of_measurement: h
          mode: box

stop_auto_filtration:
  name: Arrêter la filtration automatique
  description: Annule le cycle automatique et arrête la pompe.

enable_auto_schedule:
  name: Activer la planification filtration
  description: Active le planificateur quotidien Pool Pilot. La pompe démarre automatiquement aux créneaux calculés.

disable_auto_schedule:
  name: Désactiver la planification filtration
  description: Désactive le planificateur quotidien Pool Pilot et coupe la pompe si elle était pilotée par Pool Pilot.

toggle_auto_schedule:
  name: Basculer la planification filtration
  description: Active ou désactive la planification quotidienne de filtration.

update_strip_test:
  name: Enregistrer un test de bandelette
  description: Enregistre les valeurs mesurées manuellement dans le Mode Expert du dashboard.
  fields:
    ph:
      name: pH
      selector:
        number:
          min: 0
          max: 14
          step: 0.01
          mode: box
    alkalinity:
      name: TAC
      selector:
        number:
          min: 0
          max: 500
          step: 1
          unit_of_measurement: ppm
          mode: box
    calcium:
      name: TH
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          unit_of_measurement: ppm
          mode: box
    cya:
      name: Stabilisant
      selector:
        number:
          min: 0
          max: 300
          step: 1
          unit_of_measurement: ppm
          mode: box
    free_chlorine:
      name: Chlore libre
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          unit_of_measurement: ppm
          mode: box
    total_chlorine:
      name: Chlore total
      selector:
        number:
          min: 0
          max: 20
          step: 0.1
          unit_of_measurement: ppm
          mode: box
    temperature:
      name: Température
      selector:
        number:
          min: 0
          max: 50
          step: 0.1
          unit_of_measurement: °C
          mode: box

add_journal_entry:
  name: Ajouter une entrée au carnet d'entretien
  fields:
    category:
      name: Catégorie
      required: false
      selector:
        select:
          options:
            - weather
            - stock
            - note
            - strip_test
            - equipment
            - water_quality
            - cleaning
            - chemical
            - drain
            - filtration
            - maintenance
            - filter
            - alert
    title:
      name: Titre
      required: false
      selector:
        text:
    description:
      name: Commentaire
      required: false
      selector:
        text:
          multiline: true
    quantity:
      name: Quantité
      required: false
      selector:
        number:
          min: 0
          max: 100000
          step: 0.1
          mode: box
    unit:
      name: Unité
      required: false
      selector:
        text:
    percent:
      name: Pourcentage
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 1
remove_journal_entry:
  name: Supprimer une entrée du carnet d'entretien
  fields:
    entry_id:
      name: ID entrée
      required: true
      selector:
        text:
